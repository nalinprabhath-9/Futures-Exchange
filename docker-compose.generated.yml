version: '3.9'
services:
  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node1
    ports:
      - "5001:5001"
    environment:
      - NODE_ID=node1
      - PORT=5001
      - DB_PATH=/data/chain.db
      - PEERS=http://node2:5002,http://node3:5003
      - MINER_ADDRESS=miner_node1
      - PROPOSAL_TIMEOUT=3600
    volumes:
      - ./volumes/node1:/data
  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node2
    ports:
      - "5002:5002"
    environment:
      - NODE_ID=node2
      - PORT=5002
      - DB_PATH=/data/chain.db
      - PEERS=http://node1:5001,http://node3:5003
      - MINER_ADDRESS=miner_node2
      - PROPOSAL_TIMEOUT=3600
    volumes:
      - ./volumes/node2:/data
  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node3
    ports:
      - "5003:5003"
    environment:
      - NODE_ID=node3
      - PORT=5003
      - DB_PATH=/data/chain.db
      - PEERS=http://node1:5001,http://node2:5002
      - MINER_ADDRESS=miner_node3
      - PROPOSAL_TIMEOUT=3600
    volumes:
      - ./volumes/node3:/data
